name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y makeself

      - name: Create installer
        run: ./installer/linux/create-installer.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobGraph-Linux
          path: dist/JobGraph-Linux-x64.run

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: JobGraph-Linux
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: JobGraph ${{ github.ref_name }}
          body: |
            ## JobGraph ${{ github.ref_name }}
            
            ### 下载
            
            **Linux**: `JobGraph-Linux-x64.run`
            
            ### 安装说明
            
            ```bash
            chmod +x JobGraph-Linux-x64.run
            ./JobGraph-Linux-x64.run
            ```
            
            安装程序会自动下载并安装所有依赖（Python、Neo4j、Redis）。
            
            安装完成后访问 http://localhost:8504
            
            ### Windows 用户
            
            Windows 用户请从源码安装：
            ```bash
            git clone <repo-url>
            cd jobgraph
            make quickstart
            ```
            
            ### 内置数据
            - 63 家公司、69 个职位、8 条评价
          files: artifacts/*
          draft: false
          prerelease: false
